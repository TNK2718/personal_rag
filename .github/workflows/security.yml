name: security

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python dependency security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Ensure tool.uv.exclude-newer is fresh (today - 7 days)
        run: |
          python3 scripts/refresh_uv_exclude_newer.py || true
          if ! git diff --quiet -- pyproject.toml; then
            echo "::error::pyproject.toml's tool.uv.exclude-newer is stale."
            echo "Run scripts/refresh_uv_exclude_newer.py locally and commit."
            git --no-pager diff -- pyproject.toml
            exit 1
          fi

      - name: Check uv.lock minimum package age (>=7 days)
        run: python3 scripts/check_dependency_age.py

      - name: pip-audit on uv.lock
        run: scripts/run_pip_audit.sh

  pnpm:
    name: pnpm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: src/frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level high

  gitleaks:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks detect --redact --verbose --no-banner
